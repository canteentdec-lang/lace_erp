<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<meta name="theme-color" content="#6C63FF">
<title>लेस ERP - लॉग इन</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box}body{font-family:'Poppins',sans-serif;background:linear-gradient(135deg,#6C63FF 0%,#4834d4 60%,#a29bfe 100%);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:16px}
.card{background:#fff;border-radius:24px;padding:36px 32px;width:100%;max-width:400px;box-shadow:0 20px 60px rgba(0,0,0,.25);border:none}
.logo{width:68px;height:68px;background:linear-gradient(135deg,#6C63FF,#a29bfe);border-radius:18px;display:flex;align-items:center;justify-content:center;margin:0 auto 16px;font-size:30px;color:#fff}
h2{font-weight:700;color:#1e1b4b;font-size:22px;text-align:center;margin-bottom:4px}
.sub{color:#6b7280;font-size:13px;text-align:center;margin-bottom:28px}
label{font-size:13px;font-weight:600;color:#6b7280;margin-bottom:5px;display:block}
.ig{position:relative}
.ig i{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:#a29bfe;font-size:16px}
.ig input{padding:12px 14px 12px 40px;border:1.5px solid #e5e7eb;border-radius:12px;width:100%;font-size:15px;font-family:inherit;transition:.2s;background:#f9f8ff}
.ig input:focus{border-color:#6C63FF;box-shadow:0 0 0 3px rgba(108,99,255,.15);outline:none;background:#fff}
.btn-login{background:linear-gradient(135deg,#6C63FF,#4834d4);color:#fff;border:none;padding:14px;width:100%;border-radius:12px;font-size:16px;font-weight:600;font-family:inherit;cursor:pointer;margin-top:8px;transition:.2s;letter-spacing:.3px}
.btn-login:hover{transform:translateY(-1px);box-shadow:0 8px 24px rgba(108,99,255,.4)}
.err{background:#fee2e2;color:#991b1b;padding:10px 14px;border-radius:10px;font-size:13px;margin-bottom:14px;display:flex;align-items:center;gap:8px}
.admin-link{text-align:center;margin-top:20px}
.admin-link a{color:#a29bfe;font-size:13px;text-decoration:none;font-weight:500}
.admin-link a:hover{color:#6C63FF}
@media(max-width:480px){.card{padding:28px 20px;border-radius:18px}}
</style>
</head>
<body>
<div class="card">
  <div class="logo"><i class="bi bi-gem"></i></div>
  <h2>लेस ERP सिस्टम</h2>
  <p class="sub">अपना लॉगिन करें</p>
  {% if error %}<div class="err"><i class="bi bi-exclamation-circle"></i>{{ error }}</div>{% endif %}
  <form method="post">
    {% csrf_token %}
    <div class="mb-3">
      <label>यूजर आईडी</label>
      <div class="ig"><i class="bi bi-person"></i><input type="text" name="user_id" placeholder="यूजर आईडी दर्ज करें" required autocomplete="username"></div>
    </div>
    <div class="mb-4">
      <label>पासवर्ड</label>
      <div class="ig"><i class="bi bi-lock"></i><input type="password" name="password" placeholder="पासवर्ड दर्ज करें" required autocomplete="current-password"></div>
    </div>
    <button type="submit" class="btn-login">लॉग इन करें →</button>
  </form>
  <div class="admin-link"><a href="{% url 'adm_login' %}"><i class="bi bi-shield-lock me-1"></i>Admin Panel</a></div>
</div>
</body>
</html>
