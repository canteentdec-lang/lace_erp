<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#6C63FF">
<title>{% block title %}Lace ERP{% endblock %}</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --P:#6C63FF; --PD:#5149e0; --PL:#ede9ff;
  --BG:#F4F6FF; --txt:#1e1b4b; --muted:#6b7280; --border:#e5e7eb;
  --green:#10b981; --red:#ef4444; --yellow:#f59e0b;
  --sw:260px; --hh:60px;
  --sh:0 2px 12px rgba(108,99,255,.13);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Poppins',sans-serif;background:var(--BG);color:var(--txt);min-height:100vh;font-size:14px}

/* ─── SIDEBAR (always fixed, always on top) ─── */
.sidebar{
  position:fixed;
  top:0; left:0;
  width:var(--sw);
  height:100vh;
  background:linear-gradient(160deg,#6C63FF,#4834d4);
  z-index:1050;
  display:flex;
  flex-direction:column;
  overflow-y:auto;
  /* desktop: visible normally */
  transform:translateX(0);
  transition:transform 0.28s cubic-bezier(.4,0,.2,1);
}
.sidebar .brand{
  padding:18px 20px;
  border-bottom:1px solid rgba(255,255,255,.15);
  color:#fff; font-size:17px; font-weight:700;
  display:flex; align-items:center; gap:10px; flex-shrink:0;
}
.sidebar .brand small{font-size:11px;font-weight:400;opacity:.7;display:block;margin-top:2px}
.sidebar .brand .close-btn{
  display:none; /* hidden on desktop */
  margin-left:auto;
  background:none; border:none;
  color:rgba(255,255,255,.8); font-size:22px;
  cursor:pointer; padding:0; line-height:1;
}
.sidebar nav{flex:1;overflow-y:auto;padding:8px 0}
.sidebar nav .sec{font-size:10px;font-weight:700;color:rgba(255,255,255,.45);padding:14px 20px 4px;letter-spacing:1.5px;text-transform:uppercase}
.sidebar nav a{
  display:flex; align-items:center; gap:11px;
  padding:11px 20px;
  color:rgba(255,255,255,.78);
  text-decoration:none; font-size:13px;
  border-left:3px solid transparent;
  transition:.2s;
}
.sidebar nav a:hover,
.sidebar nav a.active{background:rgba(255,255,255,.15);color:#fff;border-left-color:#fff}
.sidebar-footer{padding:16px 20px;border-top:1px solid rgba(255,255,255,.12);flex-shrink:0}

/* ─── OVERLAY (only shown on mobile when sidebar open) ─── */
.sidebar-overlay{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.55);
  z-index:1049;
}

/* ─── MAIN CONTENT ─── */
.layout{display:flex;min-height:100vh}
.main{flex:1;margin-left:var(--sw);display:flex;flex-direction:column;min-height:100vh;transition:margin .28s ease}

/* ─── TOPBAR ─── */
.topbar{
  background:#fff;
  padding:0 20px;
  height:var(--hh);
  display:flex; align-items:center; justify-content:space-between;
  box-shadow:var(--sh);
  position:sticky; top:0; z-index:100;
}
.topbar h5{font-weight:700;font-size:15px;margin:0}

/* ─── HAMBURGER (hidden on desktop) ─── */
.menu-toggle{
  display:none;
  background:none; border:none;
  font-size:26px; color:var(--P);
  cursor:pointer; padding:4px 6px; line-height:1;
}

.page-body{padding:20px;flex:1}

/* ─── CARDS ─── */
.card{border:none;border-radius:14px;box-shadow:var(--sh);background:#fff}
.stat-card{border-radius:14px;background:#fff;box-shadow:var(--sh);padding:20px;display:flex;align-items:center;gap:16px;transition:.2s}
.stat-card:hover{transform:translateY(-3px)}
.stat-icon{width:50px;height:50px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
.stat-val{font-size:22px;font-weight:700;line-height:1}
.stat-lbl{font-size:12px;color:var(--muted);margin-top:3px}

/* ─── TABLES ─── */
.table-responsive{border-radius:12px;overflow:hidden}
.table{font-size:13px;margin:0}
.table thead th{background:#f8f9ff;color:var(--muted);font-weight:600;font-size:11px;letter-spacing:.5px;text-transform:uppercase;border-bottom:2px solid var(--border);white-space:nowrap;padding:12px 14px}
.table tbody td{padding:12px 14px;vertical-align:middle;border-bottom:1px solid var(--border)}
.table tbody tr:last-child td{border-bottom:none}
.table tbody tr:hover{background:#fafbff}

/* ─── FORMS ─── */
.form-control,.form-select{border-radius:10px;border:1.5px solid var(--border);padding:10px 14px;font-size:14px;font-family:inherit;transition:.2s}
.form-control:focus,.form-select:focus{border-color:var(--P);box-shadow:0 0 0 3px rgba(108,99,255,.13);outline:none}
.form-label{font-size:13px;font-weight:600;color:var(--muted);margin-bottom:5px}

/* ─── BUTTONS ─── */
.btn{border-radius:10px;font-weight:500;font-size:13px;padding:9px 18px;transition:.2s}
.btn-primary{background:var(--P);border-color:var(--P)}
.btn-primary:hover{background:var(--PD);border-color:var(--PD)}
.btn-outline-primary{color:var(--P);border-color:var(--P)}
.btn-outline-primary:hover{background:var(--P);color:#fff}
.btn-sm{padding:6px 12px;font-size:12px}
.btn-icon{width:34px;height:34px;padding:0;display:inline-flex;align-items:center;justify-content:center;border-radius:8px}

/* ─── BADGES ─── */
.badge{font-size:11px;font-weight:600;padding:4px 10px;border-radius:20px}
.badge-purple{background:var(--PL);color:var(--P)}
.badge-green{background:#d1fae5;color:#065f46}
.badge-red{background:#fee2e2;color:#991b1b}
.badge-yellow{background:#fef3c7;color:#92400e}

/* ─── TOASTS ─── */
.toast-wrap{position:fixed;top:70px;right:16px;z-index:9999;width:300px;display:flex;flex-direction:column;gap:8px}
.toast-msg{background:#fff;border-radius:12px;padding:14px 16px;box-shadow:0 4px 20px rgba(0,0,0,.15);border-left:4px solid var(--green);font-size:13px;animation:toastIn .3s ease;display:flex;gap:10px;align-items:flex-start}
.toast-msg.err{border-left-color:var(--red)}
.toast-msg.warn{border-left-color:var(--yellow)}
@keyframes toastIn{from{transform:translateX(120%);opacity:0}to{transform:none;opacity:1}}

/* ─── BILL/CHALLAN ITEM ROWS ─── */
.item-row td{padding:8px 6px}
.item-row .form-control,.item-row .form-select{padding:7px 10px;font-size:13px}

/* ─── PRINT ─── */
@media print{
  .sidebar,.topbar,.no-print,.sidebar-overlay,.menu-toggle{display:none!important}
  .main{margin-left:0!important}
  .page-body{padding:0!important}
  .card{box-shadow:none!important;border:1px solid #ddd!important}
  body{background:#fff!important;font-size:12px}
}

/* ═══════════════════════════════════════
   MOBILE  ≤ 768 px
═══════════════════════════════════════ */
@media(max-width:768px){

  /* 1. Slide sidebar off-screen to the left */
  .sidebar{
    transform:translateX(-100%);
  }

  /* 2. When JS adds .open → slide back in */
  .sidebar.open{
    transform:translateX(0);
  }

  /* 3. Show overlay when sidebar open */
  .sidebar-overlay.open{
    display:block;
  }

  /* 4. Show hamburger button */
  .menu-toggle{display:block}

  /* 5. Show close button inside sidebar */
  .sidebar .brand .close-btn{display:block}

  /* 6. Content fills full width */
  .main{margin-left:0}

  /* 7. Tighter spacing */
  .topbar{padding:0 14px}
  .page-body{padding:14px}
  .stat-card{padding:14px}
  .stat-val{font-size:18px}

  /* 8. Tables → card rows on mobile */
  .table thead{display:none}
  .table tbody tr{
    display:block;
    border:1px solid var(--border);
    border-radius:10px;
    margin-bottom:10px;
    padding:4px 0;
    background:#fff;
  }
  .table tbody td{
    display:flex;
    justify-content:space-between;
    align-items:center;
    border-bottom:1px solid #f0f0f0;
    padding:9px 12px;
    font-size:13px;
  }
  .table tbody td:last-child{border-bottom:none}
  .table tbody td::before{
    content:attr(data-label);
    font-weight:600; color:var(--muted);
    font-size:11px; text-transform:uppercase; letter-spacing:.5px;
    flex-shrink:0; margin-right:8px;
  }

  /* 9. Toasts full-width */
  .toast-wrap{width:calc(100% - 32px);left:16px;right:16px}
}

@media(max-width:480px){
  .stat-card{padding:12px}
  .stat-icon{width:42px;height:42px;font-size:18px}
  .stat-val{font-size:16px}
  .page-body{padding:10px}
}
</style>
{% block head %}{% endblock %}
</head>
<body>

{% if messages %}
<div class="toast-wrap">
{% for m in messages %}
<div class="toast-msg {% if m.tags == 'error' %}err{% elif m.tags == 'warning' %}warn{% endif %}">
  <i class="bi {% if m.tags == 'error' %}bi-x-circle text-danger{% elif m.tags == 'warning' %}bi-exclamation-triangle text-warning{% else %}bi-check-circle text-success{% endif %}"></i>
  <span>{{ m }}</span>
</div>
{% endfor %}
</div>
{% endif %}

{% block body %}{% endblock %}

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
<script>
/* ── Toast auto-dismiss ── */
setTimeout(function(){
  document.querySelectorAll('.toast-msg').forEach(function(el){
    el.style.transition='.4s';
    el.style.opacity='0';
    setTimeout(function(){if(el.parentNode)el.remove();},420);
  });
},4000);

/* ── Sidebar toggle ──
   Called by:
     • hamburger button in topbar
     • close (×) button inside sidebar brand
     • overlay tap
*/
function toggleSidebar(){
  var sb = document.getElementById('adminSidebar');
  var ov = document.getElementById('sidebarOverlay');
  if(!sb || !ov) return;
  var isOpen = sb.classList.contains('open');
  if(isOpen){
    sb.classList.remove('open');
    ov.classList.remove('open');
    document.body.style.overflow = '';
  } else {
    sb.classList.add('open');
    ov.classList.add('open');
    document.body.style.overflow = 'hidden'; /* prevent body scroll when sidebar open */
  }
}

/* Close sidebar when any nav link is tapped on mobile */
document.addEventListener('DOMContentLoaded', function(){
  var sb = document.getElementById('adminSidebar');
  if(!sb) return;
  sb.querySelectorAll('nav a').forEach(function(link){
    link.addEventListener('click', function(){
      if(window.innerWidth <= 768){
        sb.classList.remove('open');
        var ov = document.getElementById('sidebarOverlay');
        if(ov) ov.classList.remove('open');
        document.body.style.overflow = '';
      }
    });
  });
});
</script>
{% block js %}{% endblock %}
</body>
</html>
