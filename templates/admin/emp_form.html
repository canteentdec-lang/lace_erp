{% extends 'base.html' %}{% block title %}{{ title }}{% endblock %}
{% block body %}<div class="layout">{% include 'admin/sidebar.html' %}
<div class="main"><div class="topbar"><div class="d-flex align-items-center gap-3"><button class="menu-toggle" onclick="toggleSidebar()"><i class="bi bi-list"></i></button><h5>{{ title }}</h5></div><a href="{% url 'emp_list' %}" class="btn btn-sm btn-outline-primary"><i class="bi bi-arrow-left me-1"></i>Back</a></div>
<div class="page-body"><div class="row justify-content-center"><div class="col-md-7 col-lg-5">
<div class="card p-4">
<form method="post">{% csrf_token %}
<div class="mb-3"><label class="form-label">Full Name *</label><input class="form-control" name="name" value="{{ obj.name|default:'' }}" required></div>
<div class="mb-3"><label class="form-label">User ID *</label><input class="form-control" name="user_id" value="{{ obj.user_id|default:'' }}" required></div>
<div class="mb-3"><label class="form-label">Password *</label><input class="form-control" name="password" value="{{ obj.password|default:'' }}" required></div>
<div class="mb-3"><label class="form-label">Machine</label>
<select class="form-select" name="machine"><option value="">-- No Machine --</option>
{% for m in machines %}<option value="{{ m.pk }}" {% if obj and obj.machine and obj.machine.pk == m.pk %}selected{% endif %}>Machine {{ m.machine_number }} ({{ m.get_category_display }})</option>{% endfor %}
</select></div>
<div class="mb-3"><label class="form-label">Joining Date *</label><input class="form-control" type="date" name="joining_date" value="{{ obj.joining_date|date:'Y-m-d'|default:'' }}" required></div>
<div class="mb-3"><label class="form-label">Salary per Hour (₹) *</label><input class="form-control" type="number" step="0.01" name="salary_per_hour" value="{{ obj.salary_per_hour|default:'' }}" required></div>
{% if obj %}<div class="mb-4"><div class="form-check"><input class="form-check-input" type="checkbox" name="is_active" id="isActive" {% if obj.is_active %}checked{% endif %}><label class="form-check-label" for="isActive">Active Employee</label></div></div>{% endif %}
<button type="submit" class="btn btn-primary w-100">Save Employee</button>
</form></div></div></div></div></div></div>{% endblock %}
