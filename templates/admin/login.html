<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>Admin Login</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box}body{font-family:'Poppins',sans-serif;background:linear-gradient(135deg,#1e1b4b,#4834d4);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:16px}
.card{background:#fff;border-radius:20px;padding:36px 32px;width:100%;max-width:380px;box-shadow:0 20px 60px rgba(0,0,0,.3);border:none}
.logo{width:64px;height:64px;background:linear-gradient(135deg,#1e1b4b,#6C63FF);border-radius:16px;display:flex;align-items:center;justify-content:center;margin:0 auto 14px;font-size:28px;color:#fff}
h2{font-weight:700;text-align:center;font-size:20px;margin-bottom:4px}
.sub{color:#6b7280;font-size:13px;text-align:center;margin-bottom:24px}
label{font-size:13px;font-weight:600;color:#6b7280;display:block;margin-bottom:5px}
input{width:100%;padding:12px 14px;border:1.5px solid #e5e7eb;border-radius:10px;font-size:15px;font-family:inherit;transition:.2s;background:#f9f8ff}
input:focus{border-color:#6C63FF;outline:none;box-shadow:0 0 0 3px rgba(108,99,255,.13)}
.btn-login{background:linear-gradient(135deg,#1e1b4b,#4834d4);color:#fff;border:none;padding:13px;width:100%;border-radius:10px;font-size:15px;font-weight:600;cursor:pointer;margin-top:8px;font-family:inherit}
.err{background:#fee2e2;color:#991b1b;padding:10px 14px;border-radius:8px;font-size:13px;margin-bottom:12px}
.back{text-align:center;margin-top:16px}<br>.back a{color:#6C63FF;font-size:13px;text-decoration:none}
@media(max-width:440px){.card{padding:24px 18px}}
</style>
</head>
<body>
<div class="card">
  <div class="logo"><i class="bi bi-shield-lock"></i></div>
  <h2>Admin Panel</h2>
  <p class="sub">Lace ERP Management System</p>
  {% if error %}<div class="err"><i class="bi bi-exclamation-circle me-2"></i>{{ error }}</div>{% endif %}
  <form method="post">{% csrf_token %}
    <div class="mb-3"><label>Username</label><input name="username" placeholder="admin" required autocomplete="username"></div>
    <div class="mb-4"><label>Password</label><input type="password" name="password" placeholder="••••••••" required autocomplete="current-password"></div>
    <button type="submit" class="btn-login"><i class="bi bi-box-arrow-in-right me-2"></i>Login</button>
  </form>
  <div class="back"><a href="{% url 'emp_login' %}">← Employee Login</a></div>
</div>
</body>
</html>
