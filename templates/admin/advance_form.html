{% extends 'base.html' %}{% block title %}Give Advance{% endblock %}
{% block body %}<div class="layout">{% include 'admin/sidebar.html' %}
<div class="main"><div class="topbar"><div class="d-flex align-items-center gap-3"><button class="menu-toggle" onclick="toggleSidebar()"><i class="bi bi-list"></i></button><h5>Give Advance</h5></div><a href="{% url 'advance_list' %}" class="btn btn-sm btn-outline-primary"><i class="bi bi-arrow-left me-1"></i>Back</a></div>
<div class="page-body"><div class="row justify-content-center"><div class="col-md-6 col-lg-4"><div class="card p-4">
<form method="post">{% csrf_token %}
<div class="mb-3"><label class="form-label">Employee *</label>
<select class="form-select" name="employee" required><option value="">-- Select Employee --</option>
{% for e in emps %}<option value="{{ e.pk }}">{{ e.name }}</option>{% endfor %}
</select></div>
<div class="mb-3"><label class="form-label">Amount (₹) *</label><input class="form-control" type="number" step="0.01" name="amount" required></div>
<div class="mb-3"><label class="form-label">Date *</label><input class="form-control" type="date" name="date" required></div>
<div class="mb-4"><label class="form-label">Note</label><textarea class="form-control" name="note" rows="2" placeholder="Optional note..."></textarea></div>
<button type="submit" class="btn btn-primary w-100">Save Advance</button>
</form></div></div></div></div></div></div>{% endblock %}
