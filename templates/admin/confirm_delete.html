{% extends 'base.html' %}{% block title %}Confirm Delete{% endblock %}
{% block body %}<div class="layout">{% include 'admin/sidebar.html' %}
<div class="main"><div class="topbar"><div class="d-flex align-items-center gap-3"><button class="menu-toggle" onclick="toggleSidebar()"><i class="bi bi-list"></i></button><h5>Confirm Delete</h5></div></div>
<div class="page-body"><div class="row justify-content-center"><div class="col-md-5 col-lg-4">
<div class="card p-4 text-center">
<div style="width:64px;height:64px;background:#fee2e2;border-radius:16px;display:flex;align-items:center;justify-content:center;margin:0 auto 16px;font-size:28px;color:#ef4444"><i class="bi bi-trash"></i></div>
<h5 style="font-weight:700;margin-bottom:8px">Delete this record?</h5>
<p style="color:#6b7280;font-size:14px;margin-bottom:24px"><strong>{{ obj }}</strong><br>This cannot be undone.</p>
<form method="post">{% csrf_token %}
<button type="submit" class="btn btn-danger me-2">Yes, Delete</button>
<a href="{% url back %}" class="btn btn-outline-secondary">Cancel</a>
</form></div></div></div></div></div>{% endblock %}
